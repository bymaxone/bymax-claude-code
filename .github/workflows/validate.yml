name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate marketplace + plugins
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (jq + shellcheck)
        run: sudo apt-get update && sudo apt-get install -y jq shellcheck

      - name: Run validate.sh
        # Validates marketplace.json, every plugin.json, frontmatter on commands/agents,
        # shell-script executable bits, shellcheck, and required project-level files.
        run: ./scripts/validate.sh
